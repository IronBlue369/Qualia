  <polyline points="85,247 170,216 255,185 340,115 348,92 382,138 404,216 416,286 421,321 425,340 429,321 434,286 446,216 468,138 478,100 488,340 500,340 510,92 595,185 680,216 765,247"
            fill="none" stroke="#a83a3a" stroke-width="2.5" stroke-dasharray="6,3" stroke-linejoin="round" stroke-linecap="round"/>

  <text x="425" y="22" font-size="13" fill="#1a1208" text-anchor="middle" font-weight="600">Fovea</text>
  <text x="491" y="22" font-size="13" fill="#8b1a1a" text-anchor="middle" font-weight="600">Blind spot</text>

  <rect x="600" y="48" width="150" height="56" fill="#ffffff" fill-opacity="0.92" stroke="#c8bfaa" stroke-width="1"/>
