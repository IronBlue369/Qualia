  <line x1="612" y1="88" x2="640" y2="88" stroke="#a83a3a" stroke-width="2.5" stroke-dasharray="6,3" stroke-linecap="round"/>
  <text x="648" y="92" font-size="14" fill="#1a1208">Rods (桿体)</text>
