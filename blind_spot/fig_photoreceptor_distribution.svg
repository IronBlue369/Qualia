  </g>

  <text x="170" y="386" font-size="14" fill="#3d3020" text-anchor="middle">← 耳側 (temporal)</text>
  <text x="680" y="386" font-size="14" fill="#3d3020" text-anchor="middle">鼻側 (nasal) →</text>

  <g font-size="13" fill="#3d3020" text-anchor="end">
