<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" style="display:block;width:100%;height:auto;background:#faf8f3;font-family:sans-serif;">
  <rect x="85" y="30" width="680" height="310" fill="#ffffff" stroke="none"/>

  <line x1="85" y1="30"    x2="765" y2="30"    stroke="#e8e2d2" stroke-width="1"/>
