  <line x1="85" y1="185"   x2="765" y2="185"   stroke="#e8e2d2" stroke-width="1"/>
  <line x1="85" y1="262.5" x2="765" y2="262.5" stroke="#e8e2d2" stroke-width="1"/>

  <line x1="255" y1="30" x2="255" y2="340" stroke="#e8e2d2" stroke-width="1"/>
