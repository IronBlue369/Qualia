    <text x="76" y="267">50k</text>
    <line x1="79" y1="185" x2="85" y2="185" stroke="#3d3020" stroke-width="1.5"/>
    <text x="76" y="190">100k</text>
    <line x1="79" y1="107.5" x2="85" y2="107.5" stroke="#3d3020" stroke-width="1.5"/>
    <text x="76" y="112">150k</text>
    <line x1="79" y1="30" x2="85" y2="30" stroke="#3d3020" stroke-width="1.5"/>
    <text x="76" y="35">200k</text>
  </g>

  <text x="38" y="185" font-size="14" fill="#3d3020" text-anchor="middle" transform="rotate(-90 38 185)">受容体の数 (個 / mm²)</text>

  <polyline points="85,334 155,334 255,334 340,329 382,318 404,301 416,247 421,154 425,32 429,154 434,247 446,301 468,318 480,326 488,340 500,340 510,326 595,333 680,334 765,334"
