<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:#faf8f3;color:#3d3020;font-family:'Source Serif 4',serif;min-height:100vh;overflow-x:hidden}
a{text-decoration:none;color:inherit}

/* ── MASTHEAD ── */
header.mh{background:#faf8f3;border-bottom:3px double #1a1208;padding:0 32px;height:54px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:200}
.mh-left{display:flex;align-items:center;gap:16px}
.mh-burger{background:none;border:none;cursor:pointer;display:flex;flex-direction:column;gap:5px;padding:6px}
.mh-burger span{display:block;width:20px;height:1.5px;background:#1a1208;transition:background .2s}
.mh-burger:hover span{background:#8b1a1a}
.mh-center{text-align:center}
.mh-name{font-family:'Playfair Display',serif;font-size:17px;font-weight:900;letter-spacing:.05em;color:#1a1208;display:block;line-height:1.1}
.mh-name em{color:#8b1a1a;font-style:normal}
.mh-right{display:flex;align-items:center;gap:14px}
.mh-search{background:none;border:none;cursor:pointer;padding:6px;color:#7a6a55;transition:color .2s}
.mh-search:hover{color:#8b1a1a}

/* ── PAGE HEADER ── */
.page-header{max-width:840px;margin:0 auto;padding:52px 24px 0;text-align:center}
.page-title{font-family:'Playfair Display',serif;font-size:32px;color:#1a1208;font-weight:400;margin-bottom:10px}
.page-subtitle{font-family:'Source Serif 4',serif;font-size:14.5px;color:#5a4a36;line-height:1.85;font-style:italic;max-width:480px;margin:0 auto}

/* ── CONTROLS ── */
.controls-wrap{max-width:840px;margin:28px auto 0;padding:0 24px;display:flex;flex-wrap:wrap;gap:6px;align-items:center;justify-content:center}
.cat-btn{font-family:'Source Sans 3',sans-serif;font-size:11px;font-weight:400;padding:4px 11px;border-radius:2px;border:1px solid #e0d8c8;background:transparent;color:#7a6a55;cursor:pointer;transition:all .22s}
.cat-btn.active{border-color:#1a1208;color:#1a1208;background:rgba(26,18,8,.05)}
.cat-btn:hover:not(.active){border-color:#a09080;color:#5a4a36}
.cat-btn .cb-dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:4px;vertical-align:middle}

/* ── TIMELINE ── */
.tl{max-width:840px;margin:0 auto;padding:40px 24px 80px;position:relative}

/* ── ERA ── */
.era{position:relative;margin-left:90px;padding-left:44px;padding-bottom:20px;border-left:1.5px solid #d8d0c0}
.era:last-child .era-spine-end{display:block}
.era::before{content:'';position:absolute;left:-6px;top:0;width:11px;height:11px;border-radius:50%;background:#faf8f3;border:2px solid #8b1a1a;z-index:2}

/* era header */
.era-head{margin-bottom:20px}
.era-year-range{position:absolute;left:-92px;top:-1px;width:78px;text-align:right;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500;color:#8b1a1a;line-height:1.4}
.era-title{font-family:'Playfair Display',serif;font-size:21px;font-weight:700;color:#1a1208;line-height:1.3;margin-bottom:6px}

/* narrative */
.era-narrative{font-family:'Source Serif 4',serif;font-size:14px;color:#5a4a36;line-height:1.85;margin-bottom:24px;padding:14px 18px;border-left:3px solid #e0d8c8;background:linear-gradient(120deg,rgba(243,239,230,.6) 0%,rgba(237,232,220,.25) 100%);border-radius:0 3px 3px 0;position:relative}
.era-narrative::before{content:'"';position:absolute;top:6px;left:6px;font-family:'Playfair Display',serif;font-size:32px;color:#d8d0c0;line-height:1;pointer-events:none}

/* ── CLUSTER (同時代グループ) ── */
.cluster{margin-bottom:24px;position:relative}
.cluster-year{position:absolute;left:-136px;top:6px;width:78px;text-align:right;font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:500;color:#3d3020}
.cluster-items{display:flex;flex-direction:column;gap:6px}

/* ── ENTRY ── */
.entry{position:relative;padding:12px 16px;border-radius:3px;transition:all .3s;cursor:default}

/* dot on spine */
.entry::before{content:'';position:absolute;left:-51px;top:16px;width:7px;height:7px;border-radius:50%;background:#8b1a1a;z-index:2;transition:transform .2s}
.entry:hover::before{transform:scale(1.5)}

/* published article */
.entry.published{background:#fff;border:1px solid #e0d8c8;box-shadow:0 1px 3px rgba(60,40,10,.05)}
.entry.published:hover{border-color:#c8bfaa;box-shadow:0 2px 8px rgba(60,40,10,.1)}
.entry.published .entry-title a{color:#1a1208;transition:color .2s}
.entry.published .entry-title a:hover{color:#8b1a1a}

/* unpublished article (density filler) */
.entry.unpublished{background:transparent;border:1px dashed #e0d8c8;opacity:.55}
.entry.unpublished:hover{opacity:.8}
.entry.unpublished::before{background:#c8bfaa}

/* cat bar */
.entry-cat-bar{position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px 0 0 3px}

.entry-cat{font-family:'Source Sans 3',sans-serif;font-size:9px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;margin-bottom:3px}
.entry-title{font-family:'Playfair Display',serif;font-size:15.5px;font-weight:700;color:#1a1208;line-height:1.3;margin-bottom:3px}
.entry-desc{font-family:'Source Sans 3',sans-serif;font-size:12.5px;font-weight:400;color:#5a4a36;line-height:1.55}
.entry-badge{display:inline-block;font-family:'Source Sans 3',sans-serif;font-size:9px;font-weight:500;letter-spacing:.08em;padding:1px 6px;border-radius:2px;margin-left:6px;vertical-align:middle}
.entry-badge.soon{color:#a09080;border:1px solid #d8d0c0}

/* ── SIMULTANEITY CONNECTOR ── */
.simul-note{font-family:'Source Sans 3',sans-serif;font-size:11px;color:#8b1a1a;font-style:italic;padding:4px 0 4px 18px;border-left:2px solid rgba(139,26,26,.15);margin:2px 0 8px}

/* ── FADE ── */
.fade{opacity:0;transform:translateY(14px);transition:opacity .5s ease,transform .5s ease}
.fade.on{opacity:1;transform:none}

/* ── LEGEND (bottom) ── */
.legend{max-width:840px;margin:0 auto;padding:0 24px 20px;display:flex;flex-wrap:wrap;gap:14px;align-items:center;justify-content:center}
.legend-item{display:flex;align-items:center;gap:5px;font-family:'Source Sans 3',sans-serif;font-size:11px;color:#7a6a55}
.legend-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* ── FOOTER ── */
footer{background:#1a1208;padding:40px 24px 28px;margin-top:40px}
.footer-inner{max-width:840px;margin:0 auto;display:flex;justify-content:space-between;align-items:flex-start}
.f-name{font-family:'Playfair Display',serif;font-size:15px;font-weight:900;color:#e8ddd0;letter-spacing:.05em;margin-bottom:6px}
.f-name em{color:#8b1a1a;font-style:normal}
.f-copy{font-family:'Source Sans 3',sans-serif;font-size:10px;color:#6a5a48}
.f-links{display:flex;gap:24px}
.f-links a{font-family:'Source Sans 3',sans-serif;font-size:11px;color:#9a8878;transition:color .2s}
.f-links a:hover{color:#e8ddd0}

/* ── RESPONSIVE ── */
@media(max-width:700px){
  .era{margin-left:56px;padding-left:28px}
  .era-year-range{left:-58px;width:50px;font-size:9px}
  .cluster-year{left:-86px;width:50px;font-size:11px}
  .entry::before{left:-35px}
  .era::before{left:-6px}
  .page-title{font-size:26px}
  .footer-inner{flex-direction:column;gap:16px}
}
</style>
</head>

];

/* ==============================================================
   SIMULTANEITY NOTES — 同じ年のトピックに気づきメモを添える
   ============================================================== */
const simulNotes={
  '1666':'同じ1666年。ニュートンのプリズム実験が「色とは何か」の問いを二つに分岐させた。',
  '1938':'同じ1938年。スキナーのネズミとベンフォードの数字——行動と数学がすれ違う。',
  '1939':'同じ1939年。A=440Hzの国際標準化、誕生日のパラドックスの論文発表、そして第二次世界大戦の開戦。',
  '1980':'1980年前後。フラクタルの無限とスキューモーフィズムの模倣——複雑さと単純化が同居した時代。',
  '-300':'紀元前300年頃。プラトンと荘子が、互いの存在を知らないまま、同じ問いを立てた。',
};

/* ==============================================================
   RENDER
   ============================================================== */
const activeCats=new Set(cats.map(c=>c.id));

function buildControls(){
  const el=document.getElementById('controls');
  let h='';
  cats.forEach(c=>{
    h+=`<button class="cat-btn active" data-cat="${c.id}" onclick="toggleCat(this)"><span class="cb-dot" style="background:${c.color}"></span>${c.name}</button>`;
  });
  el.innerHTML=h;
}

function toggleCat(btn){
  const cat=btn.dataset.cat;
  if(activeCats.has(cat)){activeCats.delete(cat);btn.classList.remove('active')}
  else{activeCats.add(cat);btn.classList.add('active')}
  applyFilters();
}

function applyFilters(){
  document.querySelectorAll('.entry').forEach(el=>{
    const cat=el.dataset.cat;
    el.style.display=activeCats.has(cat)?'':'none';
  });
  // hide simul notes if their year cluster is fully hidden
  document.querySelectorAll('.simul-note').forEach(el=>{
    const cluster=el.closest('.cluster');
    if(!cluster)return;
    const visible=cluster.querySelectorAll('.entry[style=""], .entry:not([style])');
    let count=0;
    cluster.querySelectorAll('.entry').forEach(e=>{if(e.style.display!=='none')count++});
    el.style.display=count>1?'':'none';
  });
}

function render(){
  buildControls();
  const tl=document.getElementById('tl');
  let html='';

  eras.forEach(era=>{
    html+=`<div class="era fade">`;
    html+=`<div class="era-head">`;
    html+=`<div class="era-year-range">${era.yearLabel.replace('\n','<br>')}</div>`;
    html+=`<div class="era-title">${era.title}</div>`;
    html+=`</div>`;
    html+=`<div class="era-narrative">${era.narrative}</div>`;

    // Group entries by year for cluster rendering
    const groups={};
    era.entries.forEach(e=>{
      const k=e.year;
      if(!groups[k])groups[k]=[];
      groups[k].push(e);
    });
    const sortedYears=Object.keys(groups).map(Number).sort((a,b)=>a-b);

    sortedYears.forEach(yr=>{
      const items=groups[yr];
      const yrStr=yr<0?`BC${Math.abs(yr)}`:yr;
      html+=`<div class="cluster">`;
      html+=`<div class="cluster-year">${yrStr}</div>`;

      // Simultaneity note
      if(items.length>1 && simulNotes[String(yr)]){
        html+=`<div class="simul-note">${simulNotes[String(yr)]}</div>`;
      }

      html+=`<div class="cluster-items">`;
      items.forEach(e=>{
        const c=cm[e.cat]||{color:'#7a6a55',name:''};
        const cls=e.published?'published':'unpublished';
        html+=`<div class="entry ${cls} fade" data-cat="${e.cat}">`;
        html+=`<div class="entry-cat-bar" style="background:${c.color}"></div>`;
        html+=`<div class="entry-cat" style="color:${c.color}">${c.name}</div>`;
        if(e.published && e.url){
          html+=`<div class="entry-title"><a href="${e.url}">${e.title}</a></div>`;
        } else {
          html+=`<div class="entry-title">${e.title}`;
          if(!e.published) html+=`<span class="entry-badge soon">準備中</span>`;
          html+=`</div>`;
        }
        html+=`<div class="entry-desc">${e.desc}</div>`;
        html+=`</div>`;
      });
      html+=`</div></div>`;
    });

    html+=`</div>`;
  });

  tl.innerHTML=html;
  observeFades();
}

/* ==============================================================
   SCROLL FADE
   ============================================================== */
function observeFades(){
  const obs=new IntersectionObserver(entries=>{
    entries.forEach(e=>{if(e.isIntersecting)e.target.classList.add('on')});
  },{threshold:.06,rootMargin:'0px 0px -30px 0px'});
  document.querySelectorAll('.fade').forEach(el=>obs.observe(el));
}

render();
</script>
</body>
</html>
