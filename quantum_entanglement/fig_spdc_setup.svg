<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320" role="img" aria-label="SPDC実験の模式図">
  <defs>
    <marker id="arrR" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#8b1a1a"/>
    </marker>
    <marker id="arrV" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#5a3a8a"/>
    </marker>
  </defs>
  <rect x="1" y="1" width="718" height="318" fill="#faf8f3" stroke="#c8bfaa" stroke-width="1"/>

  <!-- UVレーザー -->
  <rect x="20" y="140" width="100" height="40" fill="#5a3a8a" stroke="#5a3a8a"/>
  <text x="70" y="166" text-anchor="middle" font-family="Source Sans 3, sans-serif" font-size="15" font-weight="700" fill="#faf8f3">UVレーザー</text>

  <!-- pump 光子 -->
  <line x1="120" y1="160" x2="276" y2="160" stroke="#5a3a8a" stroke-width="3" marker-end="url(#arrV)"/>
  <text x="200" y="148" text-anchor="middle" font-family="Source Sans 3, sans-serif" font-size="13" font-style="italic" fill="#5a3a8a">pump 光子</text>

  <!-- BBO 結晶 (菱形) -->
  <polygon points="300,128 332,160 300,192 268,160" fill="#faf8f3" stroke="#1a1208" stroke-width="2"/>
  <text x="300" y="166" text-anchor="middle" font-family="Source Sans 3, sans-serif" font-size="14" font-weight="700" fill="#1a1208">BBO</text>
  <text x="300" y="218" text-anchor="middle" font-family="Source Sans 3, sans-serif" font-size="13" fill="#7a6a55">非線形結晶</text>

  <!-- signal / idler -->
  <line x1="324" y1="148" x2="506" y2="74" stroke="#8b1a1a" stroke-width="2.5" marker-end="url(#arrR)"/>
  <line x1="324" y1="172" x2="506" y2="246" stroke="#8b1a1a" stroke-width="2.5" marker-end="url(#arrR)"/>
  <text x="400" y="98" text-anchor="middle" font-family="Source Sans 3, sans-serif" font-size="14" font-style="italic" fill="#8b1a1a">signal光子</text>
  <text x="400" y="234" text-anchor="middle" font-family="Source Sans 3, sans-serif" font-size="14" font-style="italic" fill="#8b1a1a">idler光子</text>

  <!-- D1 (Alice側) -->
  <text x="528" y="32" text-anchor="middle" font-family="Source Sans 3, sans-serif" font-size="13" fill="#7a6a55">Alice検出器</text>
  <circle cx="528" cy="65" r="24" fill="#faf8f3" stroke="#1a1208" stroke-width="2"/>
  <text x="528" y="73" text-anchor="middle" font-family="Source Sans 3, sans-serif" font-size="16" font-weight="700" fill="#1a1208">D1</text>

  <!-- D2 (Bob側) -->
  <circle cx="528" cy="255" r="24" fill="#faf8f3" stroke="#1a1208" stroke-width="2"/>
  <text x="528" y="263" text-anchor="middle" font-family="Source Sans 3, sans-serif" font-size="16" font-weight="700" fill="#1a1208">D2</text>
  <text x="528" y="298" text-anchor="middle" font-family="Source Sans 3, sans-serif" font-size="13" fill="#7a6a55">Bob検出器</text>

  <!-- ケーブル → 一致回路 -->
  <path d="M 552 65 H 626 V 148" fill="none" stroke="#7a6a55" stroke-width="1.4" stroke-dasharray="5,4"/>
  <path d="M 552 255 H 626 V 182" fill="none" stroke="#7a6a55" stroke-width="1.4" stroke-dasharray="5,4"/>

  <!-- 一致回路 -->
  <rect x="586" y="148" width="100" height="34" fill="#faf8f3" stroke="#1a1208" stroke-width="2"/>
  <text x="636" y="171" text-anchor="middle" font-family="Source Sans 3, sans-serif" font-size="14" font-weight="700" fill="#1a1208">一致回路</text>
</svg>
