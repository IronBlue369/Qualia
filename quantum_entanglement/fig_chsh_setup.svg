<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 380" role="img" aria-label="CHSH 2チャネル ベル測定スキーム">
  <defs>
    <marker id="arrR" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#8b1a1a"/>
    </marker>
    <marker id="arrK" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#1a1208"/>
    </marker>
  </defs>

  <!-- 背景 -->
  <rect x="1" y="1" width="718" height="378" fill="#faf8f3" stroke="#c8bfaa" stroke-width="1"/>

  <!-- 光源 S (もつれ光子対の発生源) -->
  <circle cx="360" cy="180" r="22" fill="#8b1a1a" stroke="#8b1a1a"/>
  <text x="360" y="188" text-anchor="middle" font-family="Source Sans 3, sans-serif" font-size="22" font-weight="700" fill="#faf8f3">S</text>

  <!-- もつれ光子対の経路 -->
  <line x1="338" y1="180" x2="242" y2="180" stroke="#8b1a1a" stroke-width="2.5" marker-end="url(#arrR)"/>
  <line x1="382" y1="180" x2="478" y2="180" stroke="#8b1a1a" stroke-width="2.5" marker-end="url(#arrR)"/>

  <!-- 偏光子 a / b -->
  <rect x="180" y="150" width="60" height="60" fill="#faf8f3" stroke="#1a1208" stroke-width="2"/>
  <text x="210" y="188" text-anchor="middle" font-family="Source Sans 3, sans-serif" font-size="22" font-weight="700" fill="#1a1208">a</text>
  <rect x="480" y="150" width="60" height="60" fill="#faf8f3" stroke="#1a1208" stroke-width="2"/>
  <text x="510" y="188" text-anchor="middle" font-family="Source Sans 3, sans-serif" font-size="22" font-weight="700" fill="#1a1208">b</text>

  <!-- 偏光子の +/− 出力チャネル -->
  <line x1="210" y1="150" x2="210" y2="100" stroke="#1a1208" stroke-width="2" marker-end="url(#arrK)"/>
  <line x1="210" y1="210" x2="210" y2="260" stroke="#1a1208" stroke-width="2" marker-end="url(#arrK)"/>
  <line x1="510" y1="150" x2="510" y2="100" stroke="#1a1208" stroke-width="2" marker-end="url(#arrK)"/>
  <line x1="510" y1="210" x2="510" y2="260" stroke="#1a1208" stroke-width="2" marker-end="url(#arrK)"/>

  <!-- 検出器 4個 (A+, A-, B+, B-) -->
  <circle cx="210" cy="80" r="18" fill="#faf8f3" stroke="#1a1208" stroke-width="2"/>
  <text x="210" y="88" text-anchor="middle" font-family="Source Sans 3, sans-serif" font-size="22" font-weight="700" fill="#1a1208">+</text>
  <circle cx="210" cy="280" r="18" fill="#faf8f3" stroke="#1a1208" stroke-width="2"/>
  <text x="210" y="290" text-anchor="middle" font-family="Source Sans 3, sans-serif" font-size="26" font-weight="700" fill="#1a1208">−</text>
  <circle cx="510" cy="80" r="18" fill="#faf8f3" stroke="#1a1208" stroke-width="2"/>
  <text x="510" y="88" text-anchor="middle" font-family="Source Sans 3, sans-serif" font-size="22" font-weight="700" fill="#1a1208">+</text>
  <circle cx="510" cy="280" r="18" fill="#faf8f3" stroke="#1a1208" stroke-width="2"/>
  <text x="510" y="290" text-anchor="middle" font-family="Source Sans 3, sans-serif" font-size="26" font-weight="700" fill="#1a1208">−</text>

  <!-- 検出器 → CM 信号ケーブル (破線、4 本とも CM 上辺へ収束) -->
  <path d="M 210 62 V 38 H 80 V 320 H 300 V 332" fill="none" stroke="#7a6a55" stroke-width="1.4" stroke-dasharray="5,4"/>
  <path d="M 210 298 V 312 H 280 V 332" fill="none" stroke="#7a6a55" stroke-width="1.4" stroke-dasharray="5,4"/>
  <path d="M 510 62 V 38 H 640 V 320 H 420 V 332" fill="none" stroke="#7a6a55" stroke-width="1.4" stroke-dasharray="5,4"/>
  <path d="M 510 298 V 312 H 440 V 332" fill="none" stroke="#7a6a55" stroke-width="1.4" stroke-dasharray="5,4"/>

  <!-- CM (Coincidence Monitor) -->
  <rect x="280" y="332" width="160" height="36" fill="#faf8f3" stroke="#1a1208" stroke-width="2"/>
  <text x="360" y="357" text-anchor="middle" font-family="Source Sans 3, sans-serif" font-size="20" font-weight="700" fill="#1a1208">CM</text>

  <!-- E(a, b) 出力 -->
  <line x1="440" y1="350" x2="486" y2="350" stroke="#1a1208" stroke-width="1.5" marker-end="url(#arrK)"/>
  <text x="540" y="355" text-anchor="middle" font-family="Source Sans 3, sans-serif" font-size="16" font-style="italic" fill="#1a1208">E(a, b)</text>
</svg>
