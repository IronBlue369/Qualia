<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 260" role="img" aria-label="もつれた粒子のスピン反相関">
  <defs>
    <marker id="arrSpin" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#8b1a1a"/>
    </marker>
    <marker id="arrPath" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#7a6a55"/>
    </marker>
  </defs>
  <rect x="1" y="1" width="638" height="258" fill="#faf8f3" stroke="#c8bfaa" stroke-width="1"/>

  <!-- 親粒子 S (円) -->
  <circle cx="320" cy="110" r="22" fill="#8b1a1a" stroke="#8b1a1a"/>
  <text x="320" y="117" text-anchor="middle" font-family="Source Sans 3, sans-serif" font-size="20" font-weight="700" fill="#faf8f3">S</text>
  <text x="320" y="160" text-anchor="middle" font-family="Source Sans 3, sans-serif" font-size="13" fill="#7a6a55">親粒子(発生源)</text>

  <!-- 放出経路(補助線) -->
  <line x1="298" y1="110" x2="200" y2="110" stroke="#7a6a55" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrPath)"/>
  <line x1="342" y1="110" x2="440" y2="110" stroke="#7a6a55" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrPath)"/>

  <!-- 粒子A: 反時計回り(CCW) ─ 9時 → 6 → 3 → 12 を通る270°弧, 矢印は12時で左向き -->
  <circle cx="160" cy="110" r="40" fill="#faf8f3" stroke="#1a1208" stroke-width="2"/>
  <circle cx="160" cy="110" r="4" fill="#1a1208"/>
  <path d="M 132 110 A 28 28 0 1 0 160 82" fill="none" stroke="#8b1a1a" stroke-width="3.5" marker-end="url(#arrSpin)"/>
  <text x="160" y="190" text-anchor="middle" font-family="Source Sans 3, sans-serif" font-size="18" font-weight="700" fill="#1a1208">粒子A</text>
  <text x="160" y="212" text-anchor="middle" font-family="Source Sans 3, sans-serif" font-size="13" fill="#7a6a55">反時計回り</text>

  <!-- 粒子B: 時計回り(CW) ─ 3時 → 6 → 9 → 12 を通る270°弧, 矢印は12時で右向き -->
  <circle cx="480" cy="110" r="40" fill="#faf8f3" stroke="#1a1208" stroke-width="2"/>
  <circle cx="480" cy="110" r="4" fill="#1a1208"/>
  <path d="M 508 110 A 28 28 0 1 1 480 82" fill="none" stroke="#8b1a1a" stroke-width="3.5" marker-end="url(#arrSpin)"/>
  <text x="480" y="190" text-anchor="middle" font-family="Source Sans 3, sans-serif" font-size="18" font-weight="700" fill="#1a1208">粒子B</text>
  <text x="480" y="212" text-anchor="middle" font-family="Source Sans 3, sans-serif" font-size="13" fill="#7a6a55">時計回り</text>
</svg>
