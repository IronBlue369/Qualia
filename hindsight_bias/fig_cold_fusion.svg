<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 380" style="display:block;">
  <!-- 端子記号 -->
  <text x="78" y="20" font-family="'Source Sans 3','Helvetica Neue',sans-serif" font-size="20" font-weight="700" fill="#8b1a1a" text-anchor="middle">−</text>
  <text x="242" y="20" font-family="'Source Sans 3','Helvetica Neue',sans-serif" font-size="20" font-weight="700" fill="#8b1a1a" text-anchor="middle">+</text>
  <!-- リード線 -->
