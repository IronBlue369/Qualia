  <g stroke="#7a6a55" stroke-width="0.6">
    <line x1="46" y1="140" x2="56" y2="150"/><line x1="46" y1="180" x2="56" y2="190"/>
    <line x1="46" y1="220" x2="56" y2="230"/><line x1="46" y1="260" x2="56" y2="270"/>
    <line x1="46" y1="300" x2="56" y2="310"/>
    <line x1="264" y1="140" x2="274" y2="150"/><line x1="264" y1="180" x2="274" y2="190"/>
    <line x1="264" y1="220" x2="274" y2="230"/><line x1="264" y1="260" x2="274" y2="270"/>
    <line x1="264" y1="300" x2="274" y2="310"/>
    <line x1="80" y1="349" x2="90" y2="356"/><line x1="155" y1="354" x2="165" y2="361"/>
    <line x1="230" y1="349" x2="240" y2="356"/>
  </g>
  <!-- D₂O 液体 -->
  <path d="M 60,170 L 60,302 Q 60,343 95,343 L 225,343 Q 260,343 260,302 L 260,170 Z" fill="#c0dae6" opacity="0.65"/>
  <!-- Pd陰極 -->
  <line x1="78" y1="108" x2="78" y2="295" stroke="#8b1a1a" stroke-width="4" stroke-linecap="round"/>
  <!-- Pt陽極 上部直線 -->
  <line x1="242" y1="108" x2="242" y2="206" stroke="#1a1208" stroke-width="2"/>
  <!-- Pt陽極 螺旋(連続蛇行波として描画) -->
  <path d="M 242,206 C 257,206 257,212 242,212 C 227,212 227,218 242,218 C 257,218 257,224 242,224 C 227,224 227,230 242,230 C 257,230 257,236 242,236 C 227,236 227,242 242,242 C 257,242 257,248 242,248 C 227,248 227,254 242,254 C 257,254 257,260 242,260 C 227,260 227,266 242,266 C 257,266 257,272 242,272 C 227,272 227,278 242,278 C 257,278 257,284 242,284 C 227,284 227,290 242,290" fill="none" stroke="#1a1208" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- 気泡(電気分解) -->
  <g fill="none" stroke="#5a7a90" stroke-width="0.8">
    <circle cx="74" cy="195" r="2"/><circle cx="86" cy="180" r="1.6"/>
    <circle cx="72" cy="225" r="2.3"/><circle cx="84" cy="245" r="1.8"/>
    <circle cx="252" cy="195" r="2"/><circle cx="232" cy="180" r="1.6"/>
    <circle cx="256" cy="225" r="2.3"/><circle cx="232" cy="265" r="1.8"/>
  </g>
  <!-- 電極ラベル -->
  <text x="102" y="250" font-family="'Source Sans 3','Helvetica Neue',sans-serif" font-size="16" font-weight="700" fill="#8b1a1a">Pd</text>
  <text x="218" y="250" font-family="'Source Sans 3','Helvetica Neue',sans-serif" font-size="16" font-weight="700" fill="#1a1208" text-anchor="end">Pt</text>
  <!-- 電解質ラベル -->
  <text x="160" y="328" font-family="'Source Sans 3','Helvetica Neue',sans-serif" font-size="14" fill="#1a1208" text-anchor="middle">D₂O + LiOD</text>
</svg>
