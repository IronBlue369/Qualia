  <line x1="242" y1="28" x2="242" y2="80" stroke="#1a1208" stroke-width="2"/>
  <!-- ストッパー -->
  <rect x="55" y="78" width="210" height="30" rx="3" ry="3" fill="#e8dfc8" stroke="#1a1208" stroke-width="1.5"/>
